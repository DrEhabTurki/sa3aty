<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sa3aty - ساعاتي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #121417; color: #e0e6ed; height: 100vh; overflow: hidden; display: flex; flex-direction: column; font-size: 1.1rem; }
        .glass { background: rgba(30, 32, 35, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .tab-content { display: none; flex-grow: 1; overflow-y: auto; padding: 12px; }
        .active-tab { display: block; }
        /* شريط التابات النحيف */
        nav button { padding: 8px 5px !important; font-size: 0.9rem !important; transition: 0.2s; }
        .active-btn { border-bottom: 2px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        input, select { background: #1c1f24 !important; border: 1px solid #444 !important; color: #fff !important; border-radius: 12px !important; padding: 10px; font-size: 0.95rem !important; }
        .btn-action { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
        th { padding: 10px; border-bottom: 2px solid #333; font-size: 0.85rem; }
        td { padding: 8px; border-bottom: 1px solid #222; font-size: 0.85rem; }
    </style>
</head>
<body>
    <!-- الهيدر: اللوجو بجانب الاسم -->
    <header class="p-3 bg-gray-900/40 flex items-center justify-center gap-3 border-b border-gray-800">
        <img src="logo.png" alt="Logo" class="w-10 h-10 object-contain">
        <h1 class="text-2xl font-black text-blue-400 tracking-tighter">Sa3aty</h1>
    </header>
    
    <!-- التابات النحيفة (30% من الحجم السابق) -->
    <nav class="flex justify-around bg-gray-900/60 shadow-md">
        <button onclick="showTab('empTab', this)" class="w-full active-btn">الموظفين</button>
        <button onclick="showTab('logTab', this)" class="w-full">التسجيل</button>
        <button onclick="showTab('repTab', this)" class="w-full">التقرير</button>
    </nav>

    <main class="flex-grow overflow-hidden flex flex-col">
        <!-- التبويب 1: الموظفين -->
        <div id="empTab" class="tab-content active-tab">
            <div class="glass p-5 rounded-2xl">
                <h3 class="text-center mb-4 text-gray-400 font-bold text-lg">قاعدة البيانات</h3>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="newEmpName" placeholder="اسم الموظف" class="flex-grow">
                    <button onclick="addEmployee()" class="btn-action px-5 rounded-xl font-bold text-2xl">+</button>
                </div>
                <ul id="empList" class="space-y-2"></ul>
            </div>
        </div>

        <!-- التبويب 2: التسجيل -->
        <div id="logTab" class="tab-content">
            <div class="glass p-5 rounded-2xl space-y-3 shadow-xl">
                <div>
                    <label class="block text-[10px] text-gray-500 mb-1 mr-1">الموظف</label>
                    <select id="logNameSelect" class="w-full"></select>
                </div>
                <div>
                    <label class="block text-[10px] text-gray-500 mb-1 mr-1">التاريخ</label>
                    <input type="date" id="logDate" class="w-full">
                </div>
                <div class="flex gap-3">
                    <div class="w-1/2">
                        <label class="block text-[10px] text-gray-500 mb-1 text-center">حضور</label>
                        <input type="time" id="logIn" class="w-full">
                    </div>
                    <div class="w-1/2">
                        <label class="block text-[10px] text-gray-500 mb-1 text-center">انصراف</label>
                        <input type="time" id="logOut" class="w-full">
                    </div>
                </div>
                <button onclick="addLog()" class="btn-action w-full py-4 rounded-xl font-bold text-lg mt-3">حفظ</button>
            </div>
        </div>

        <!-- التبويب 3: التقرير -->
        <div id="repTab" class="tab-content">
            <div class="flex gap-2 mb-3">
                <select id="repNameSelect" onchange="renderReport()" class="w-1/2 font-bold"></select>
                <input type="month" id="repMonth" onchange="renderReport()" class="w-1/2 font-bold">
            </div>
            
            <div id="reportContainer" class="glass p-4 rounded-2xl">
                <div id="printHeader" class="text-center mb-4 border-b-2 border-blue-500 pb-2 hidden">
                    <h1 class="text-xl font-bold text-white">Sa3aty Report</h1>
                    <p id="printInfo" class="text-xs text-blue-300"></p>
                </div>

                <div class="text-center mb-4 bg-blue-500/5 py-3 rounded-xl border border-blue-500/10">
                    <p class="text-[10px] text-gray-400 font-bold uppercase">إجمالي الساعات</p>
                    <h2 id="monthTotal" class="text-4xl font-black text-blue-400">0:00 Hr</h2>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-center" id="reportTable">
                        <thead>
                            <tr class="text-blue-300">
                                <th>تاريخ</th>
                                <th>حضور</th>
                                <th>انصراف</th>
                                <th>مدة</th>
                            </tr>
                        </thead>
                        <tbody id="reportItems" class="text-gray-300"></tbody>
                    </table>
                </div>
            </div>
            
            <div class="grid grid-cols-3 gap-2 mt-4 pb-4">
                <button onclick="exportXLSX()" class="bg-green-600/10 text-green-400 py-3 rounded-xl font-bold border border-green-600/20 text-xs">Excel</button>
                <button onclick="exportSmartPDF()" class="bg-red-600/10 text-red-400 py-3 rounded-xl font-bold border border-red-600/20 text-xs">PDF</button>
                <button onclick="exportPNG()" class="bg-purple-600/10 text-purple-400 py-3 rounded-xl font-bold border border-purple-600/20 text-xs">صورة</button>
            </div>
        </div>
    </main>

    <script>
        let employees = JSON.parse(localStorage.getItem('employees') || '[]');
        let logs = JSON.parse(localStorage.getItem('logs') || '[]');

        function showTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-btn'));
            document.getElementById(tabId).style.display = 'block';
            btn.classList.add('active-btn');
            if(tabId === 'repTab') renderReport();
        }

        function addEmployee() {
            const name = document.getElementById('newEmpName').value.trim();
            if(!name || employees.includes(name)) return;
            employees.push(name);
            localStorage.setItem('employees', JSON.stringify(employees));
            document.getElementById('newEmpName').value = '';
            renderEmployees();
            updateSelectors();
        }

        function renderEmployees() {
            const list = document.getElementById('empList');
            list.innerHTML = employees.map((e, i) => `
                <li class="flex justify-between items-center p-3 bg-gray-800/40 rounded-xl border border-white/5">
                    <span class="font-bold text-sm">${e}</span>
                    <button onclick="delEmp(${i})" class="text-red-500 bg-red-500/10 px-3 py-1 rounded-lg text-xs">حذف</button>
                </li>`).join('');
        }

        function delEmp(i) {
            if(confirm('سيتم حذف الموظف، هل أنت متأكد؟')) {
                employees.splice(i, 1);
                localStorage.setItem('employees', JSON.stringify(employees));
                renderEmployees();
                updateSelectors();
            }
        }

        function updateSelectors() {
            const logSel = document.getElementById('logNameSelect');
            const repSel = document.getElementById('repNameSelect');
            const options = employees.map(e => `<option value="${e}">${e}</option>`).join('');
            if(logSel) logSel.innerHTML = options;
            if(repSel) repSel.innerHTML = options;
        }

        function addLog() {
            const name = document.getElementById('logNameSelect').value;
            const date = document.getElementById('logDate').value;
            const tIn = document.getElementById('logIn').value;
            const tOut = document.getElementById('logOut').value;
            if(!name || !date || !tIn || !tOut) return alert('أكمل البيانات');
            logs.push({ name, date, in: tIn, out: tOut });
            localStorage.setItem('logs', JSON.stringify(logs));
            alert('تم التسجيل بنجاح');
        }

        function calc(s, e) {
            const [h1, m1] = s.split(':').map(Number);
            const [h2, m2] = e.split(':').map(Number);
            let d = (h2*60+m2) - (h1*60+m1);
            if (d < 0) d += 1440;
            return d/60;
        }

        function fmt(dec) {
            const h = Math.floor(dec);
            const m = Math.round((dec - h) * 60);
            return `${h}:${m.toString().padStart(2, '0')}`;
        }

        function renderReport() {
            const name = document.getElementById('repNameSelect').value;
            const month = document.getElementById('repMonth').value;
            const body = document.getElementById('reportItems');
            body.innerHTML = '';
            let total = 0;

            if(!name) return;

            const filtered = logs.filter(l => l.name === name && l.date.startsWith(month));
            filtered.sort((a,b) => new Date(a.date) - new Date(b.date))
                .forEach(l => {
                    const dur = calc(l.in, l.out);
                    total += dur;
                    body.innerHTML += `
                        <tr>
                            <td>${l.date.split('-').slice(1).join('/')}</td>
                            <td>${l.in}</td>
                            <td>${l.out}</td>
                            <td class="text-blue-400 font-bold">${fmt(dur)}</td>
                        </tr>`;
                });
            
            document.getElementById('monthTotal').innerText = `${fmt(total)} Hr`;
            document.getElementById('printInfo').innerText = `الموظف: ${name} | الشهر: ${month}`;
        }

        function exportSmartPDF() {
            const header = document.getElementById('printHeader');
            header.style.display = 'block';
            html2canvas(document.querySelector("#reportContainer"), { backgroundColor: '#121417', scale: 2.5 }).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                pdf.addImage(imgData, 'PNG', 0, 10, pdfWidth, pdfHeight);
                pdf.save(`Sa3aty_${document.getElementById('repNameSelect').value}.pdf`);
                header.style.display = 'none';
            });
        }

        function exportPNG() {
            const header = document.getElementById('printHeader');
            header.style.display = 'block';
            html2canvas(document.querySelector("#reportContainer"), { backgroundColor: '#121417', scale: 2.5 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Sa3aty_${document.getElementById('repNameSelect').value}.png`;
                link.href = canvas.toDataURL();
                link.click();
                header.style.display = 'none';
            });
        }

        function exportXLSX() {
            const name = document.getElementById('repNameSelect').value;
            const month = document.getElementById('repMonth').value;
            const filtered = logs.filter(l => l.name === name && l.date.startsWith(month)).map(l => {
                const duration = calc(l.in, l.out);
                return { "الموظف": l.name, "التاريخ": l.date, "حضور": l.in, "انصراف": l.out, "ساعات": fmt(duration) };
            });
            const ws = XLSX.utils.json_to_sheet(filtered);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Attendance");
            XLSX.writeFile(wb, `Sa3aty_${name}_${month}.xlsx`);
        }

        window.onload = () => {
            document.getElementById('logDate').valueAsDate = new Date();
            document.getElementById('repMonth').value = new Date().toISOString().slice(0, 7);
            renderEmployees();
            updateSelectors();
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js').then(() => console.log('SW Registered'));
            }
        };
    </script>
</body>
</html>
