<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Sa3aty - ساعاتي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --main-bg: #fbfbfd; --card-bg: rgba(255, 255, 255, 0.8); 
            --text: #1d1d1f; --accent: #0071e3; --border: rgba(0,0,0,0.05);
            --btn-bg: #0071e3; --btn-text: #ffffff;
        }
        
        .theme-dark { --main-bg: #000000; --card-bg: #1c1c1e; --text: #f5f5f7; --accent: #0a84ff; --border: #38383a; --btn-bg: #0a84ff; --btn-text: #ffffff; }
        .theme-gold { --main-bg: #1a1610; --card-bg: #2a2419; --text: #f3e5ab; --accent: #d4af37; --border: #3d3422; --btn-bg: #d4af37; --btn-text: #1a1610; }
        .theme-cyber { --main-bg: #0d0221; --card-bg: #190e38; --text: #00f2ff; --accent: #ff00ff; --border: #2d1b5e; --btn-bg: #ff00ff; --btn-text: #ffffff; }
        .theme-forest { --main-bg: #0a1a12; --card-bg: #142d20; --text: #dcfce7; --accent: #22c55e; --border: #1a3a2a; --btn-bg: #22c55e; --btn-text: #ffffff; }
        .theme-rose { --main-bg: #fff5f7; --card-bg: #ffffff; --text: #a01a58; --accent: #ff2d55; --border: #ffccd5; --btn-bg: #ff2d55; --btn-text: #ffffff; }

        body { font-family: 'Cairo', sans-serif; background-color: var(--main-bg); color: var(--text); transition: 0.4s ease; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .glass { background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px; }
        
        input, select { 
            width: 50% !important; height: 50px !important; margin: 0 auto; display: block;
            background: rgba(120, 120, 128, 0.1) !important; border: 1px solid var(--border) !important; 
            color: var(--text) !important; border-radius: 12px !important; 
            padding: 0 15px; font-size: 0.9rem !important; text-align: center; font-weight: 600;
        }
        .btn-premium { background: var(--btn-bg); color: var(--btn-text); border-radius: 16px; font-weight: 700; transition: 0.2s; cursor: pointer; }
        .logo-img { width: 45px; height: 45px; object-fit: contain; } 

        /* تعديل منطقة المحتوى لتسمح بالتمرير */
        .tab-content { display: none; flex-direction: column; height: 100%; overflow: hidden; padding: 15px; }
        .scrollable-area { flex-grow: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 80px; }
        .active-tab { display: flex; animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        nav button { font-weight: 700; font-size: 0.9rem; color: var(--text); opacity: 0.3; transition: 0.3s; position: relative; }
        .active-btn { opacity: 1; color: var(--accent) !important; }
        .active-btn::after { content: ''; position: absolute; bottom: 0; left: 35%; width: 30%; height: 4px; background: var(--accent); border-radius: 10px; }

        .editable-item { cursor: pointer; border-bottom: 1px dashed var(--accent); padding: 2px 5px; }

        #editModal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); align-items: center; justify-content: center; }
        .modal-box { width: 90%; max-width: 320px; padding: 25px; border-radius: 30px; text-align: center; }

        .export-mini-btn { padding: 8px 12px; border-radius: 10px; font-size: 10px; font-weight: 800; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body id="mainBody" class="theme-dark">

    <div id="editModal" onclick="closeModal(event)">
        <div class="glass modal-box" onclick="event.stopPropagation()">
            <h3 class="mb-4 font-bold opacity-70" id="modalTitle">تعديل البيانات</h3>
            <input type="date" id="editInputDate" class="mb-4 hidden">
            <input type="time" id="editInputTime" class="mb-4 hidden">
            <button onclick="saveEdit()" class="btn-premium w-full py-3">تحديث</button>
        </div>
    </div>

    <header class="p-4 flex items-center justify-between px-6 border-b var(--border) relative">
        <button onclick="toggleThemeMenu()" class="text-3xl opacity-60">⋮</button>
        <div class="flex items-center gap-3">
            <img src="logo.png" alt="Logo" class="logo-img">
            <h1 class="text-xl font-black tracking-tighter">Sa3aty</h1>
        </div>
        <div class="w-8"></div>
        <div id="themeMenu" style="display:none;">
            <button onclick="setTheme('dark')">🔘 Dark Mode</button>
            <button onclick="setTheme('default')">⚪ Light Mode</button>
            <button onclick="setTheme('gold')">📀 Gold Luxury</button>
            <button onclick="setTheme('cyber')">🎆 Cyber Punk</button>
            <button onclick="setTheme('forest')">🌿 Nature Green</button>
            <button onclick="setTheme('rose')">🌸 Soft Rose</button>
        </div>
    </header>
    
    <nav class="flex justify-around py-2 border-b var(--border)">
        <button onclick="showTab('empTab', this)" class="w-full active-btn">الموظفين</button>
        <button onclick="showTab('logTab', this)" class="w-full">التسجيل</button>
        <button onclick="showTab('repTab', this)" class="w-full">التقرير</button>
    </nav>

    <main class="flex-grow overflow-hidden">
        <div id="empTab" class="tab-content active-tab">
            <div class="scrollable-area">
                <div class="max-w-sm mx-auto space-y-6 text-center">
                    <input type="text" id="newEmpName" placeholder="اسم الموظف">
                    <button onclick="addEmployee()" class="btn-premium w-full py-4">إضافة موظف جديد</button>
                    <ul id="empList" class="space-y-4 mt-8"></ul>
                </div>
            </div>
        </div>

        <div id="logTab" class="tab-content">
            <div class="scrollable-area">
                <div class="glass p-8 max-w-sm mx-auto space-y-6 text-center mt-4">
                    <select id="logNameSelect"></select>
                    <input type="date" id="logDate">
                    <div class="flex gap-4 justify-center">
                        <input type="time" id="logIn" class="!w-24">
                        <input type="time" id="logOut" class="!w-24">
                    </div>
                    <button onclick="addLog()" class="btn-premium w-full py-4 mx-auto">حفظ الساعات</button>
                </div>
            </div>
        </div>

        <div id="repTab" class="tab-content">
            <div class="flex flex-wrap justify-center gap-2 mb-4">
                <button onclick="exportXLSX()" class="export-mini-btn bg-gray-500/10">Excel</button>
                <button onclick="exportGridPDF()" class="export-mini-btn bg-red-500/10 text-red-500">PDF Report</button>
                <button onclick="exportOldPNG()" class="export-mini-btn bg-blue-500/10 text-blue-500">Image</button>
            </div>
            <div class="flex gap-2 w-full justify-center mb-4">
                <select id="repNameSelect" onchange="renderReport()" class="!w-40"></select>
                <input type="month" id="repMonth" onchange="renderReport()" class="!w-40">
            </div>

            <div class="scrollable-area">
                <div id="reportContainer" class="glass p-6 text-center mb-6">
                    <div class="mb-6">
                        <p class="text-[9px] opacity-40 font-bold uppercase tracking-widest">Total Hours</p>
                        <h2 id="monthTotal" class="text-5xl font-light tracking-tighter">0:00</h2>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead class="opacity-30 border-b var(--border) text-[10px]">
                                <tr>
                                    <th class="pb-3 text-right">التاريخ / اليوم</th>
                                    <th class="pb-3">حضور</th>
                                    <th class="pb-3">انصراف</th>
                                    <th class="pb-3">المدة</th>
                                </tr>
                            </thead>
                            <tbody id="reportItems" class="font-semibold"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let employees = JSON.parse(localStorage.getItem('employees') || '[]');
        let logs = JSON.parse(localStorage.getItem('logs') || '[]');
        let currentEditId = null, currentEditField = null;

        function toggleThemeMenu(){const m=document.getElementById('themeMenu');m.style.display=m.style.display==='block'?'none':'block';}
        function setTheme(t){document.getElementById('mainBody').className='theme-'+t;localStorage.setItem('userTheme',t);document.getElementById('themeMenu').style.display='none';}
        function showTab(i,b){document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active-tab'));document.querySelectorAll('nav button').forEach(btn=>btn.classList.remove('active-btn'));document.getElementById(i).classList.add('active-tab');b.classList.add('active-btn');if(i==='repTab') renderReport();}
        
        function addEmployee(){const n=document.getElementById('newEmpName').value.trim();if(!n||employees.includes(n))return;employees.push(n);localStorage.setItem('employees',JSON.stringify(employees));renderEmployees(); updateSelectors();document.getElementById('newEmpName').value='';}
        function renderEmployees(){document.getElementById('empList').innerHTML=employees.map((e,i)=>`<li class="flex justify-between items-center p-4 glass"><span>${e}</span><button onclick="delEmp(${i})" class="text-red-500 font-bold">حذف</button></li>`).join('');}
        function delEmp(i){if(confirm('حذف الموظف؟')){employees.splice(i,1);localStorage.setItem('employees',JSON.stringify(employees));renderEmployees(); updateSelectors();}}
        function updateSelectors(){const o=employees.map(e=>`<option value="${e}">${e}</option>`).join('');document.getElementById('logNameSelect').innerHTML=o;document.getElementById('repNameSelect').innerHTML=o;}
        function addLog(){const n=document.getElementById('logNameSelect').value,d=document.getElementById('logDate').value,i=document.getElementById('logIn').value,o=document.getElementById('logOut').value;if(!n||!d||!i||!o) return alert('اكمل البيانات');logs.push({id:Date.now(),name:n,date:d,in:i,out:o});localStorage.setItem('logs',JSON.stringify(logs));alert('تم الحفظ');}

        function calc(s,e){const[h1,m1]=s.split(':').map(Number),[h2,m2]=e.split(':').map(Number);let d=(h2*60+m2)-(h1*60+m1);return d<0?(d+1440)/60:d/60;}
        function fmt(dec){const h=Math.floor(dec),m=Math.round((dec-h)*60);return `${h}:${m.toString().padStart(2,'0')}`;}
        function getDayName(dateStr) {return new Date(dateStr).toLocaleDateString('en-US', { weekday: 'short' });}

        function openEditModal(id, field, val) {
            currentEditId = id; currentEditField = field;
            document.getElementById('editModal').style.display = 'flex';
            const di = document.getElementById('editInputDate'), ti = document.getElementById('editInputTime');
            di.classList.add('hidden'); ti.classList.add('hidden');
            if(field === 'date') { di.classList.remove('hidden'); di.value = val; document.getElementById('modalTitle').innerText = 'تعديل التاريخ'; }
            else { ti.classList.remove('hidden'); ti.value = val; document.getElementById('modalTitle').innerText = field === 'in' ? 'وقت الحضور' : 'وقت الانصراف'; }
        }

        function closeModal(e) { document.getElementById('editModal').style.display = 'none'; }
        
        function saveEdit() {
            const logIdx = logs.findIndex(l => l.id == currentEditId);
            const val = currentEditField === 'date' ? document.getElementById('editInputDate').value : document.getElementById('editInputTime').value;
            if(val) {
                logs[logIdx][currentEditField] = val;
                localStorage.setItem('logs', JSON.stringify(logs));
                renderReport(); closeModal();
            }
        }

        function renderReport(){
            const n=document.getElementById('repNameSelect').value,m=document.getElementById('repMonth').value,body=document.getElementById('reportItems');
            body.innerHTML=''; let totalTime=0; if(!n) return;
            const filtered = logs.filter(l=>l.name===n&&l.date.startsWith(m)).sort((a,b)=>new Date(a.date)-new Date(b.date));
            filtered.forEach(l=>{
                const d=calc(l.in,l.out); totalTime+=d;
                body.innerHTML+=`<tr class="border-b var(--border)">
                    <td class="py-4 text-[10px] opacity-60 text-right"><span class="editable-item" onclick="openEditModal(${l.id}, 'date', '${l.date}')">${getDayName(l.date)} ${l.date}</span></td>
                    <td><span class="editable-item" onclick="openEditModal(${l.id}, 'in', '${l.in}')">${l.in}</span></td>
                    <td><span class="editable-item" onclick="openEditModal(${l.id}, 'out', '${l.out}')">${l.out}</span></td>
                    <td class="text-blue-500">${fmt(d)}</td>
                </tr>`;
            });
            document.getElementById('monthTotal').innerText=fmt(totalTime);
        }

        function exportGridPDF() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            const n = document.getElementById('repNameSelect').value, m = document.getElementById('repMonth').value, t = document.getElementById('monthTotal').innerText;
            doc.setFontSize(20); doc.text("Sa3aty Work Report", 105, 20, { align: 'center' });
            doc.setFontSize(12); doc.text(`Employee: ${n} | Month: ${m} | Total: ${t} Hr`, 20, 35);
            let y = 55; doc.setFillColor(240); doc.rect(20, y-7, 170, 10, 'F');
            doc.text("Day / Date", 25, y); doc.text("In", 85, y); doc.text("Out", 125, y); doc.text("Duration", 165, y); y+=10;
            logs.filter(l=>l.name===n&&l.date.startsWith(m)).sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(l=>{
                doc.text(`${getDayName(l.date)} ${l.date}`, 25, y); doc.text(l.in, 85, y); doc.text(l.out, 125, y); doc.text(fmt(calc(l.in,l.out)), 165, y);
                doc.line(20, y+2, 190, y+2); y+=10; if(y>270){doc.addPage(); y=20;}
            });
            doc.save(`${n}_Report.pdf`);
        }

        function exportOldPNG() {
            html2canvas(document.querySelector("#reportContainer"), { backgroundColor: getComputedStyle(document.body).backgroundColor, scale: 2 }).then(canvas => {
                const l = document.createElement('a'); l.download = 'Report.png'; l.href = canvas.toDataURL(); l.click();
            });
        }

        function exportXLSX(){
            const n=document.getElementById('repNameSelect').value, m=document.getElementById('repMonth').value, d=logs.filter(l=>l.name===n&&l.date.startsWith(m)).sort((a,b)=>new Date(a.date)-new Date(b.date)).map(l=>({"اليوم":getDayName(l.date),"التاريخ":l.date,"حضور":l.in,"انصراف":l.out,"ساعات":fmt(calc(l.in,l.out))}));
            const ws=XLSX.utils.json_to_sheet(d),wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"Report"); XLSX.writeFile(wb,`Sa3aty_${n}.xlsx`);
        }

        window.onload = () => {
            document.getElementById('logDate').valueAsDate = new Date();
            document.getElementById('repMonth').value = new Date().toISOString().slice(0, 7);
            setTheme(localStorage.getItem('userTheme') || 'dark');
            renderEmployees(); updateSelectors();
            if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js?v=15');
        };
    </script>
</body>
</html>
