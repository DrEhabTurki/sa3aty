<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تايم كيبر الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root { --main-bg: #121417; --card-bg: rgba(30, 32, 35, 0.7); }
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--main-bg); 
            color: #e0e6ed; 
            margin: 0; 
            display: flex; 
            justify-content: center;
            min-height: 100vh;
        }
        .app-container { width: 100%; max-width: 450px; padding: 20px; }
        .glass { 
            background: var(--card-bg); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        input, select { 
            background: #1c1f24 !important; 
            border: 1px solid #333 !important; 
            color: #fff !important; 
            text-align: center;
            border-radius: 12px !important;
        }
        .btn-glow {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            transition: all 0.3s ease;
        }
        .btn-glow:active { transform: scale(0.95); }
        .table-scroll { overflow-x: auto; border-radius: 15px; }
        th { background: rgba(59, 130, 246, 0.1); color: #60a5fa; font-weight: bold; padding: 12px; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
        .total-box { 
            background: linear-gradient(180deg, rgba(59, 130, 246, 0.1) 0%, rgba(59, 130, 246, 0) 100%);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">تايم كيبر الذكي</h1>
            <p class="text-gray-500 text-sm mt-2">إدارة ساعات العمل باحترافية</p>
        </header>

        <!-- تسجيل الدخول -->
        <div class="glass p-6 mb-6">
            <h2 class="text-lg mb-4 text-center border-b border-gray-700 pb-2">تسجيل الحضور</h2>
            <div class="space-y-4">
                <input type="text" id="empName" placeholder="اسم الموظف" class="w-full p-3">
                <input type="date" id="workDate" class="w-full p-3">
                <div class="flex gap-2">
                    <div class="w-1/2">
                        <label class="block text-[10px] text-gray-400 mb-1 text-center">وقت الحضور</label>
                        <input type="time" id="tIn" class="w-full p-3">
                    </div>
                    <div class="w-1/2">
                        <label class="block text-[10px] text-gray-400 mb-1 text-center">وقت الانصراف</label>
                        <input type="time" id="tOut" class="w-full p-3">
                    </div>
                </div>
                <button onclick="addEntry()" class="btn-glow w-full py-4 rounded-2xl font-bold text-white mt-4">إضافة السجل</button>
            </div>
        </div>

        <!-- عرض التقرير -->
        <div id="reportArea" class="glass p-4 mb-6">
            <h3 class="text-md mb-4 text-center font-bold text-blue-300">سجل البيانات</h3>
            <div class="table-scroll">
                <table class="w-full text-center" id="reportTable">
                    <thead>
                        <tr>
                            <th class="text-xs">الموظف</th>
                            <th class="text-xs">التاريخ</th>
                            <th class="text-xs">المدة</th>
                            <th class="text-xs">حذف</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-gray-300"></tbody>
                </table>
            </div>
            
            <div class="total-box mt-6 p-4 rounded-2xl text-center">
                <span class="text-xs text-gray-400 block mb-1">إجمالي الساعات</span>
                <span id="grandTotal" class="text-3xl font-bold text-blue-400">0:00 Hr</span>
            </div>
        </div>

        <!-- أزرار التصدير -->
        <div class="grid grid-cols-3 gap-2 mb-10">
            <button onclick="exportXLSX()" class="bg-gray-800 text-green-400 p-3 rounded-xl border border-green-900/30 text-xs">Excel</button>
            <button onclick="exportPDF()" class="bg-gray-800 text-red-400 p-3 rounded-xl border border-red-900/30 text-xs">PDF</button>
            <button onclick="exportPNG()" class="bg-gray-800 text-purple-400 p-3 rounded-xl border border-purple-900/30 text-xs">صورة</button>
        </div>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('logs') || '[]');

        function calc(start, end) {
            const [h1, m1] = start.split(':').map(Number);
            const [h2, m2] = end.split(':').map(Number);
            let diff = (h2 * 60 + m2) - (h1 * 60 + m1);
            if (diff < 0) diff += 1440; 
            return diff / 60;
        }

        function formatTime(decimal) {
            const h = Math.floor(decimal);
            const m = Math.round((decimal - h) * 60);
            return `${h}:${m.toString().padStart(2, '0')} Hr`;
        }

        function render() {
            const body = document.getElementById('tableBody');
            body.innerHTML = '';
            let total = 0;
            data.forEach((item, i) => {
                const duration = calc(item.in, item.out);
                total += duration;
                body.innerHTML += `
                    <tr>
                        <td><input type="text" value="${item.name}" onchange="update(${i},'name',this.value)" class="w-full bg-transparent border-none text-xs"></td>
                        <td><input type="date" value="${item.date}" onchange="update(${i},'date',this.value)" class="w-full bg-transparent border-none text-[10px]"></td>
                        <td class="font-bold text-blue-300 text-xs">${formatTime(duration)}</td>
                        <td><button onclick="del(${i})" class="text-red-900 bg-red-500/10 w-6 h-6 rounded-full">✕</button></td>
                    </tr>`;
            });
            document.getElementById('grandTotal').innerText = formatTime(total);
            localStorage.setItem('logs', JSON.stringify(data));
        }

        function addEntry() {
            const name = document.getElementById('empName').value;
            const date = document.getElementById('workDate').value;
            const tIn = document.getElementById('tIn').value;
            const tOut = document.getElementById('tOut').value;
            if(!name || !date || !tIn || !tOut) return alert('برجاء ملء جميع الحقول');
            data.push({name, date, in: tIn, out: tOut});
            render();
        }

        function update(i, k, v) { data[i][k] = v; render(); }
        function del(i) { if(confirm('هل تريد الحذف؟')) { data.splice(i, 1); render(); } }

        function exportXLSX() {
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Report");
            XLSX.writeFile(wb, "Time_Report.xlsx");
        }

        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.autoTable({ html: '#reportTable', theme: 'grid' });
            doc.save('Report.pdf');
        }

        function exportPNG() {
            html2canvas(document.querySelector("#reportArea"), {backgroundColor: '#121417'}).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Report.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }
        render();
    </script>
</body>
</html>
