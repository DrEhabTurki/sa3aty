<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sa3aty - ساعاتي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #121417; color: #e0e6ed; height: 100vh; overflow: hidden; display: flex; flex-direction: column; font-size: 1.1rem; }
        .glass { background: rgba(30, 32, 35, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .tab-content { display: none; flex-grow: 1; overflow-y: auto; padding: 15px; }
        .active-tab { display: block; }
        .active-btn { border-bottom: 4px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        input, select { background: #1c1f24 !important; border: 1px solid #444 !important; color: #fff !important; border-radius: 14px !important; padding: 12px; font-size: 1rem !important; }
        .btn-action { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
        th { padding: 12px; border-bottom: 2px solid #333; font-size: 0.95rem; }
        td { padding: 10px; border-bottom: 1px solid #222; font-size: 0.95rem; }
        .report-header-print { display: none; }
    </style>
</head>
<body>
    <header class="p-4 text-center bg-gray-900/30 flex flex-col items-center">
    <img src="logo.png" alt="Sa3aty Logo" class="w-20 h-20 mb-2 object-contain">
    <h1 class="text-3xl font-extrabold text-blue-400 tracking-wider">Sa3aty</h1>
</header>
    
    <nav class="flex justify-around border-b border-gray-800 bg-gray-900/60 shadow-lg">
        <button onclick="showTab('empTab', this)" class="p-4 text-lg active-btn">الموظفين</button>
        <button onclick="showTab('logTab', this)" class="p-4 text-lg">التسجيل</button>
        <button onclick="showTab('repTab', this)" class="p-4 text-lg">التقرير</button>
    </nav>

    <main class="flex-grow overflow-hidden flex flex-col">
        <!-- الموظفين -->
        <div id="empTab" class="tab-content active-tab">
            <div class="glass p-6 rounded-3xl shadow-2xl">
                <h3 class="text-center mb-6 text-gray-400 font-bold text-xl border-b border-gray-700 pb-2">قاعدة بيانات الموظفين</h3>
                <div class="flex gap-3 mb-6">
                    <input type="text" id="newEmpName" placeholder="أدخل اسم الموظف" class="flex-grow">
                    <button onclick="addEmployee()" class="btn-action px-6 rounded-2xl font-bold text-3xl">+</button>
                </div>
                <ul id="empList" class="space-y-3"></ul>
            </div>
        </div>

        <!-- التسجيل -->
        <div id="logTab" class="tab-content">
            <div class="glass p-6 rounded-3xl space-y-5 shadow-2xl">
                <h3 class="text-center text-gray-400 font-bold text-xl mb-2">تسجيل ساعات العمل</h3>
                <div>
                    <label class="block text-sm text-gray-500 mb-2 mr-2">اختيار الموظف</label>
                    <select id="logNameSelect" class="w-full"></select>
                </div>
                <div>
                    <label class="block text-sm text-gray-500 mb-2 mr-2">التاريخ اليومي</label>
                    <input type="date" id="logDate" class="w-full">
                </div>
                <div class="flex gap-4">
                    <div class="w-1/2">
                        <label class="block text-xs text-gray-500 mb-2 text-center">وقت الحضور</label>
                        <input type="time" id="logIn" class="w-full">
                    </div>
                    <div class="w-1/2">
                        <label class="block text-xs text-gray-500 mb-2 text-center">وقت الانصراف</label>
                        <input type="time" id="logOut" class="w-full">
                    </div>
                </div>
                <button onclick="addLog()" class="btn-action w-full py-5 rounded-2xl font-bold text-xl mt-6 shadow-lg shadow-blue-900/20">حفظ في السجل</button>
            </div>
        </div>

        <!-- التقرير -->
        <div id="repTab" class="tab-content">
            <div class="flex gap-3 mb-5">
                <select id="repNameSelect" onchange="renderReport()" class="w-1/2 font-bold"></select>
                <input type="month" id="repMonth" onchange="renderReport()" class="w-1/2 font-bold">
            </div>
            
            <div id="reportContainer" class="glass p-5 rounded-3xl relative">
                <!-- هذا الجزء يظهر فقط في التصدير -->
                <div id="printHeader" class="text-center mb-6 border-b-2 border-blue-500 pb-4 hidden">
                    <h1 class="text-2xl font-bold text-white mb-1">تقرير ساعات العمل - Sa3aty</h1>
                    <p id="printInfo" class="text-blue-300 font-bold"></p>
                </div>

                <div class="text-center mb-6 bg-blue-500/10 py-4 rounded-2xl border border-blue-500/20">
                    <p class="text-sm text-gray-400 font-bold">إجمالي ساعات العمل للشهر</p>
                    <h2 id="monthTotal" class="text-5xl font-black text-blue-400 mt-1">0:00 Hr</h2>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-center" id="reportTable">
                        <thead>
                            <tr class="text-blue-300">
                                <th>التاريخ</th>
                                <th>حضور</th>
                                <th>انصراف</th>
                                <th class="text-blue-100 font-bold">المدة</th>
                            </tr>
                        </thead>
                        <tbody id="reportItems" class="text-gray-300"></tbody>
                    </table>
                </div>
            </div>
            
            <div class="grid grid-cols-3 gap-3 mt-6 pb-6">
                <button onclick="exportXLSX()" class="bg-green-600/20 text-green-400 py-4 rounded-2xl font-bold border border-green-600/30 text-sm">Excel</button>
                <button onclick="exportSmartPDF()" class="bg-red-600/20 text-red-400 py-4 rounded-2xl font-bold border border-red-600/30 text-sm">PDF</button>
                <button onclick="exportPNG()" class="bg-purple-600/20 text-purple-400 py-4 rounded-2xl font-bold border border-purple-600/30 text-sm">صورة</button>
            </div>
        </div>
    </main>

    <script>
        let employees = JSON.parse(localStorage.getItem('employees') || '[]');
        let logs = JSON.parse(localStorage.getItem('logs') || '[]');

        function showTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-btn'));
            document.getElementById(tabId).style.display = 'block';
            btn.classList.add('active-btn');
            if(tabId === 'repTab') renderReport();
        }

        function addEmployee() {
            const name = document.getElementById('newEmpName').value.trim();
            if(!name || employees.includes(name)) return;
            employees.push(name);
            localStorage.setItem('employees', JSON.stringify(employees));
            document.getElementById('newEmpName').value = '';
            renderEmployees();
            updateSelectors();
        }

        function renderEmployees() {
            const list = document.getElementById('empList');
            list.innerHTML = employees.map((e, i) => `
                <li class="flex justify-between items-center p-4 bg-gray-800/40 rounded-2xl border border-white/5">
                    <span class="font-bold">${e}</span>
                    <button onclick="delEmp(${i})" class="text-red-500 bg-red-500/10 px-4 py-2 rounded-xl text-sm">حذف</button>
                </li>`).join('');
        }

        function delEmp(i) {
            if(confirm('سيتم حذف الموظف، هل أنت متأكد؟')) {
                employees.splice(i, 1);
                localStorage.setItem('employees', JSON.stringify(employees));
                renderEmployees();
                updateSelectors();
            }
        }

        function updateSelectors() {
            const logSel = document.getElementById('logNameSelect');
            const repSel = document.getElementById('repNameSelect');
            const options = employees.map(e => `<option value="${e}">${e}</option>`).join('');
            logSel.innerHTML = options;
            repSel.innerHTML = options;
        }

        function addLog() {
            const name = document.getElementById('logNameSelect').value;
            const date = document.getElementById('logDate').value;
            const tIn = document.getElementById('logIn').value;
            const tOut = document.getElementById('logOut').value;
            if(!name || !date || !tIn || !tOut) return alert('أكمل البيانات');
            logs.push({ name, date, in: tIn, out: tOut });
            localStorage.setItem('logs', JSON.stringify(logs));
            alert('تم التسجيل بنجاح');
        }

        function calc(s, e) {
            const [h1, m1] = s.split(':').map(Number);
            const [h2, m2] = e.split(':').map(Number);
            let d = (h2*60+m2) - (h1*60+m1);
            if (d < 0) d += 1440;
            return d/60;
        }

        function fmt(dec) {
            const h = Math.floor(dec);
            const m = Math.round((dec - h) * 60);
            return `${h}:${m.toString().padStart(2, '0')}`;
        }

        function renderReport() {
            const name = document.getElementById('repNameSelect').value;
            const month = document.getElementById('repMonth').value;
            const body = document.getElementById('reportItems');
            body.innerHTML = '';
            let total = 0;

            if(!name) return;

            logs.filter(l => l.name === name && l.date.startsWith(month))
                .sort((a,b) => new Date(a.date) - new Date(b.date))
                .forEach(l => {
                    const dur = calc(l.in, l.out);
                    total += dur;
                    body.innerHTML += `
                        <tr>
                            <td class="font-bold text-xs">${l.date}</td>
                            <td>${l.in}</td>
                            <td>${l.out}</td>
                            <td class="text-blue-400 font-black">${fmt(dur)}</td>
                        </tr>`;
                });
            
            document.getElementById('monthTotal').innerText = `${fmt(total)} Hr`;
            document.getElementById('printInfo').innerText = `الموظف: ${name} | الشهر: ${month}`;
        }

        function prepareForPrint() {
            const header = document.getElementById('printHeader');
            header.style.display = 'block';
            return header;
        }

        function finalizePrint(header) {
            header.style.display = 'none';
        }

        function exportSmartPDF() {
            const header = prepareForPrint();
            html2canvas(document.querySelector("#reportContainer"), { backgroundColor: '#121417', scale: 2.5 }).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                pdf.addImage(imgData, 'PNG', 0, 10, pdfWidth, pdfHeight);
                pdf.save(`Sa3aty_${document.getElementById('repNameSelect').value}.pdf`);
                finalizePrint(header);
            });
        }

        function exportPNG() {
            const header = prepareForPrint();
            html2canvas(document.querySelector("#reportContainer"), { backgroundColor: '#121417', scale: 2.5 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Sa3aty_${document.getElementById('repNameSelect').value}.png`;
                link.href = canvas.toDataURL();
                link.click();
                finalizePrint(header);
            });
        }

        function exportXLSX() {
            const name = document.getElementById('repNameSelect').value;
            const month = document.getElementById('repMonth').value;
            const filtered = logs.filter(l => l.name === name && l.date.startsWith(month)).map(l => {
                const duration = calc(l.in, l.out);
                return {
                    "اسم الموظف": l.name,
                    "التاريخ": l.date,
                    "الحضور": l.in,
                    "الانصراف": l.out,
                    "عدد الساعات اليومي": fmt(duration)
                };
            });
            const ws = XLSX.utils.json_to_sheet(filtered);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Attendance");
            XLSX.writeFile(wb, `Sa3aty_${name}_${month}.xlsx`);
        }

        window.onload = () => {
            document.getElementById('logDate').valueAsDate = new Date();
            document.getElementById('repMonth').value = new Date().toISOString().slice(0, 7);
            renderEmployees();
            updateSelectors();
        };
        // إضافة كود تسجيل الـ Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('Service Worker Registered'))
      .catch(err => console.log('Service Worker Failed', err));
  });
}
    </script>
</body>
</html>
