<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Sa3aty - ساعاتي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { 
            --main-bg: #fbfbfd; --card-bg: rgba(255, 255, 255, 0.7); 
            --text: #1d1d1f; --accent: #0071e3; --border: rgba(0,0,0,0.1);
            --logo-filter: none;
        }
        
        .theme-dark { --main-bg: #000000; --card-bg: rgba(28, 28, 30, 0.8); --text: #f5f5f7; --accent: #0a84ff; --border: rgba(255,255,255,0.1); --logo-filter: brightness(0) invert(1); }
        .theme-gold { --main-bg: #1c1c1e; --card-bg: rgba(44, 44, 46, 0.8); --text: #d4af37; --accent: #d4af37; --border: rgba(212,175,55,0.2); --logo-filter: sepia(1) saturate(5) hue-rotate(10deg); }
        .theme-cyber { --main-bg: #0b0e14; --card-bg: rgba(21, 26, 35, 0.9); --text: #00f2ff; --accent: #ff00ff; --border: rgba(255,0,255,0.3); --logo-filter: hue-rotate(280deg) saturate(2); }
        .theme-forest { --main-bg: #f2f4f3; --card-bg: rgba(255,255,255,0.8); --text: #1b4332; --accent: #2d6a4f; --border: rgba(45,106,79,0.1); --logo-filter: hue-rotate(100deg) brightness(0.7); }
        .theme-rose { --main-bg: #fff5f7; --card-bg: rgba(255,255,255,0.85); --text: #a01a58; --accent: #ff2d55; --border: rgba(255,45,85,0.1); --logo-filter: hue-rotate(300deg) saturate(1.5); }

        body { font-family: 'Cairo', sans-serif; background-color: var(--main-bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass { background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.05); }
        
        /* تحسين المدخلات على طريقة Apple */
        input, select { 
            width: 50% !important; height: 55px !important; margin: 0 auto; display: block;
            background: rgba(120, 120, 128, 0.12) !important; border: none !important; 
            color: var(--text) !important; border-radius: 14px !important; 
            padding: 0 15px; font-size: 1rem !important; text-align: center;
        }
        
        .logo-img { mix-blend-mode: multiply; filter: var(--logo-filter); transition: 0.4s; }
        .tab-content { display: none; flex-grow: 1; overflow-y: auto; padding: 20px; }
        .active-tab { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        nav button { font-weight: 600; font-size: 0.95rem; color: var(--text); opacity: 0.4; padding: 12px 0; }
        .active-btn { opacity: 1; position: relative; }
        .active-btn::after { content: ''; position: absolute; bottom: 0; left: 25%; width: 50%; height: 3px; background: var(--accent); border-radius: 10px; }

        #themeMenu { display: none; position: absolute; left: 20px; top: 60px; z-index: 100; width: 180px; background: var(--card-bg); backdrop-filter: blur(25px); border-radius: 18px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.15); }
        #themeMenu button { width: 100%; text-align: right; padding: 12px 20px; font-size: 0.9rem; border-bottom: 1px solid var(--border); color: var(--text); transition: 0.2s; }
        #themeMenu button:hover { background: var(--accent); color: white; }
    </style>
</head>
<body id="mainBody" class="theme-dark">

    <header class="p-4 flex items-center justify-between px-6 border-b var(--border) relative">
        <button onclick="toggleThemeMenu()" class="text-2xl opacity-70">⋮</button>
        <div class="flex items-center gap-3">
            <img src="logo.png" alt="Logo" class="w-10 h-10 logo-img object-contain">
            <h1 class="text-xl font-bold tracking-tight">Sa3aty</h1>
        </div>
        <div class="w-6"></div>
        <div id="themeMenu">
            <button onclick="setTheme('dark')">🔘 نظام Dark</button>
            <button onclick="setTheme('default')">⚪ نظام المضيء</button>
            <button onclick="setTheme('gold')">📀 المظهر الذهبي</button>
            <button onclick="setTheme('cyber')">🎆 سايبر بانك</button>
            <button onclick="setTheme('forest')">🌿 المظهر الهادئ</button>
            <button onclick="setTheme('rose')">🌸 المظهر الوردي</button>
        </div>
    </header>
    
    <nav class="flex justify-around border-b var(--border)">
        <button onclick="showTab('empTab', this)" class="w-full active-btn">الموظفين</button>
        <button onclick="showTab('logTab', this)" class="w-full">التسجيل</button>
        <button onclick="showTab('repTab', this)" class="w-full">التقرير</button>
    </nav>

    <main class="flex-grow overflow-hidden">
        <div id="empTab" class="tab-content active-tab">
            <div class="max-w-md mx-auto space-y-6">
                <input type="text" id="newEmpName" placeholder="اسم الموظف الجديد">
                <button onclick="addEmployee()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-500/20">إضافة للقائمة</button>
                <ul id="empList" class="space-y-3 mt-8"></ul>
            </div>
        </div>

        <div id="logTab" class="tab-content">
            <div class="glass p-8 max-w-md mx-auto space-y-6 text-center">
                <select id="logNameSelect" class="font-bold"></select>
                <input type="date" id="logDate">
                <div class="flex gap-4 justify-center">
                    <input type="time" id="logIn" class="!w-24">
                    <input type="time" id="logOut" class="!w-24">
                </div>
                <button onclick="addLog()" class="w-1/2 py-4 bg-blue-600 text-white rounded-2xl font-bold mx-auto">حفظ الساعات</button>
            </div>
        </div>

        <div id="repTab" class="tab-content">
            <div class="flex flex-col gap-4 mb-8 items-center">
                <select id="repNameSelect" onchange="renderReport()"></select>
                <input type="month" id="repMonth" onchange="renderReport()">
            </div>
            
            <div id="reportContainer" class="glass p-6 text-center mb-6">
                <div class="mb-6">
                    <p class="text-xs opacity-50 font-bold uppercase tracking-widest">إجمالي وقت العمل</p>
                    <h2 id="monthTotal" class="text-5xl font-light tracking-tighter mt-1">0:00</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="opacity-40 border-b border-white/5 text-[10px]"><tr><th class="pb-2">التاريخ</th><th class="pb-2">حضور</th><th class="pb-2">انصراف</th><th class="pb-2">المدة</th></tr></thead>
                        <tbody id="reportItems" class="font-medium"></tbody>
                    </table>
                </div>
            </div>
            <div class="grid grid-cols-3 gap-3 max-w-sm mx-auto">
                <button onclick="exportXLSX()" class="bg-gray-500/10 py-3 rounded-xl text-xs font-bold">Excel</button>
                <button onclick="exportProPDF()" class="bg-red-500/10 text-red-500 py-3 rounded-xl text-xs font-bold">PDF</button>
                <button onclick="exportPNG()" class="bg-blue-500/10 text-blue-500 py-3 rounded-xl text-xs font-bold">صورة</button>
            </div>
        </div>
    </main>

    <script>
        let employees = JSON.parse(localStorage.getItem('employees') || '[]');
        let logs = JSON.parse(localStorage.getItem('logs') || '[]');

        function toggleThemeMenu(){const m=document.getElementById('themeMenu');m.style.display=m.style.display==='block'?'none':'block';}
        function setTheme(t){document.getElementById('mainBody').className='theme-'+t;localStorage.setItem('userTheme',t);document.getElementById('themeMenu').style.display='none';}
        function showTab(i,b){document.querySelectorAll('.tab-content').forEach(t=>t.style.display='none');document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active-btn'));document.getElementById(i).style.display='block';b.classList.add('active-btn');if(i==='repTab')renderReport();}
        
        function addEmployee(){const n=document.getElementById('newEmpName').value.trim();if(!n||employees.includes(n))return;employees.push(n);localStorage.setItem('employees',JSON.stringify(employees));renderEmployees();updateSelectors();document.getElementById('newEmpName').value='';}
        function renderEmployees(){document.getElementById('empList').innerHTML=employees.map((e,i)=>`<li class="flex justify-between items-center p-4 glass"><span>${e}</span><button onclick="delEmp(${i})" class="text-red-500 opacity-50 hover:opacity-100">حذف</button></li>`).join('');}
        function delEmp(i){if(confirm('حذف الموظف؟')){employees.splice(i,1);localStorage.setItem('employees',JSON.stringify(employees));renderEmployees();updateSelectors();}}
        function updateSelectors(){const o=employees.map(e=>`<option value="${e}">${e}</option>`).join('');document.getElementById('logNameSelect').innerHTML=o;document.getElementById('repNameSelect').innerHTML=o;}
        
        function addLog(){const n=document.getElementById('logNameSelect').value,d=document.getElementById('logDate').value,i=document.getElementById('logIn').value,o=document.getElementById('logOut').value;if(!n||!d||!i||!o)return alert('برجاء ملء جميع الحقول');logs.push({name:n,date:d,in:i,out:o});localStorage.setItem('logs',JSON.stringify(logs));alert('تم الحفظ بنجاح');}
        function calc(s,e){const[h1,m1]=s.split(':').map(Number),[h2,m2]=e.split(':').map(Number);let d=(h2*60+m2)-(h1*60+m1);return d<0?(d+1440)/60:d/60;}
        function fmt(dec){const h=Math.floor(dec),m=Math.round((dec-h)*60);return `${h}:${m.toString().padStart(2,'0')}`;}
        
        function renderReport(){
            const n=document.getElementById('repNameSelect').value,m=document.getElementById('repMonth').value,body=document.getElementById('reportItems');
            body.innerHTML='';let t=0;if(!n)return;
            logs.filter(l=>l.name===n&&l.date.startsWith(m)).sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(l=>{
                const d=calc(l.in,l.out);t+=d;
                body.innerHTML+=`<tr class="border-b border-white/5"><td class="py-4 text-[11px]">${l.date}</td><td>${l.in}</td><td>${l.out}</td><td class="text-blue-500">${fmt(d)}</td></tr>`;
            });
            document.getElementById('monthTotal').innerText=`${fmt(t)}`;
        }

        function exportProPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const name = document.getElementById('repNameSelect').value;
            const month = document.getElementById('repMonth').value;
            
            doc.setFontSize(22); doc.text("Work Report", 105, 20, {align: 'center'});
            doc.setFontSize(12); doc.text(`Employee: ${name} | Period: ${month}`, 105, 30, {align: 'center'});
            
            let y = 50;
            doc.line(20, y-5, 190, y-5);
            doc.text("Date", 25, y); doc.text("In", 75, y); doc.text("Out", 125, y); doc.text("Hours", 175, y);
            doc.line(20, y+2, 190, y+2);
            
            y += 10;
            logs.filter(l=>l.name===name&&l.date.startsWith(month)).forEach(l=>{
                doc.text(l.date, 25, y); doc.text(l.in, 75, y); doc.text(l.out, 125, y); doc.text(fmt(calc(l.in,l.out)), 175, y);
                y += 8;
            });
            doc.save(`${name}_Report.pdf`);
        }

        function exportPNG(){
            html2canvas(document.querySelector("#reportContainer"),{backgroundColor:null,scale:3}).then(c=>{
                const l=document.createElement('a');l.download='Sa3aty_Report.png';l.href=c.toDataURL();l.click();
            });
        }

        window.onload = () => {
            document.getElementById('logDate').valueAsDate = new Date();
            document.getElementById('repMonth').value = new Date().toISOString().slice(0, 7);
            setTheme(localStorage.getItem('userTheme') || 'dark');
            renderEmployees(); updateSelectors();
            if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js?v=4');
        };
    </script>
</body>
</html>
